<section class="relative 2xl:mb-[100px] 1xl:mb-20 xl:mb-17 lg:mb-14 md:mb-12 sm:mb-11 mb-10 w-full">
    <div class="container">
        <div class="flex lt:items-center items-start lt:flex-row flex-col 2xl:gap-35 1xl:gap-23 xl:gap-15 lg:gap-7 gap-2.5 2xl:mb-12.5 1xl:mb-12 xl:mb-11 lg:mb-10 md:mb-9 sm:mb-8 mb-7.5">
            <div class="lt:w-[52%]">
                <h3 class="text-thunder-100 font-primary italic font-medium 1xl:mb-6 sm:mb-4 mb-2.5">
                    {{ section_heading }}
                </h3>
                <h2 class="text-primary font-normal uppercase">
                    {{ section_title }}
                </h2>
            </div>
            <div class="lt:w-[48%]">
                <p class="text-thunder-100 max-w-[890px] 2xl:mb-10 1xl:mb-9 xl:mb-8 lg:mb-7.5 md:mb-7 sm:mb-6.5 mb-6">
                    {{ description }}
                </p>
                {{ if button_title }}
                <a href="{{ button_link }}" class="btn btn-secondary"> {{ button_title }}</a>
                {{ /if }}
            </div>
        </div>
        <div class="faqs">
            <!-- 1- FAQ ITEM -->
            {{ faqs }}
            <div class="faq-item">
                <button class="faq-question">
                    <div class="flex sm:items-center items-start sm:gap-1.5 gap-1">
                        <h5 class="uppercase">o{{ index + 1 }}. </h5>
                        <h5 class="uppercase">{{ question }}</h5>
                    </div>
                    <span class="faq-icon">+</span>
                </button>

                <div class="faq-answer hidden">
                    <p class="text-black">
                        {{ answer }}
                    </p>
                </div>
            </div>
            {{ /faqs }}
        </div>
    </div>
</section>
