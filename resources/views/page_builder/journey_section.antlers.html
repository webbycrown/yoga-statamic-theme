<section class="relative 2xl:mb-[100px] 1xl:mb-20 xl:mb-17 lg:mb-14 md:mb-12 sm:mb-11 mb-10 w-full">
            <div class="container">
                <div
                    class="w-full 2xl:h-[713px] 1xl:h-[680px] xl:h-[615px] lg:h-[570px] md:h-[490px] sm:h-[460px] h-[470px]">
                    <img src="{{ theme:asset }}assets/image/about_journey.webp" alt="Find Your Flow"
                        class="w-full h-full object-cover opacity-26" />
                    <div class="absolute inset-0 top-0 left-0 w-full h-full">
                        <div class="container h-full">
                            <div class="flex flex-col h-full items-center justify-center sm:px-4 px-1.5 w-full">
                                <div
                                    class="sm:border-3 border-2 border-primary rounded-full shrink-0 overflow-hidden md:p-2 p-1 1xl:size-[128px] xl:size-[115px] lg:size-[100px] md:size-[90px] sm:size-20 size-12.5 flex items-center justify-center md:mb-5 sm:mb-3 mb-2.5">
                                    {{ icon }}<img src="{{ url }}" alt="journey"
                                        class="w-full h-full object-cover" />{{ /icon }}
                                </div>
                                <h3 class="font-primary italic font-medium xl:mb-4 sm:mb-3 mb-1 text-center">
                                    {{ small_title }}
                                </h3>
                                <h2
                                    class="uppercase 1xl:mb-5 mb-3 text-center text-primary 2xl:max-w-[82%] 1xl:max-w-[87%] lt:max-w-[90%] max-w-full w-full">
                                   {{ main_title }}
                                </h2>
                                <p class="text-center xl:max-w-[70%] lg:max-w-[80%] lt:max-w-[90%] max-w-full w-full">
                                    {{ description }}
                                </p>
                                <div
                                    class="flex items-center md:gap-7.5 gap-5 sm:flex-row flex-col justify-center xl:mt-11 lg:mt-10 sm:mt-8 mt-6">
                                    {{ buttons }}
                                    <a href="{{ button_link }}"
                                        class="btn {{ button_style }} sm:w-fit w-full flex items-center xl:gap-4 gap-3">
                                       {{ button_text }}
                                        <svg width="15" height="14" viewBox="0 0 15 14" fill="none"
                                            class="lt:size-3.5 sm:size-3 size-3">
                                            <path
                                                d="M1.8667 12.616C1.8667 12.616 9.8435 4.63909 13.166 1.31657M13.166 1.31657L13.4907 9.82413M13.166 1.31657L4.65782 0.992448"
                                                stroke="currentcolor" stroke-width="2" stroke-linecap="round"
                                                stroke-linejoin="round" />
                                        </svg>

                                    </a>
                                    {{ /buttons }}
                                   
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
