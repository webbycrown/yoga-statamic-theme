 <section
            class="relative 2xl:mb-[100px] 1xl:mb-20 xl:mb-17 lg:mb-14 md:mb-12 sm:mb-11 mb-10 w-full 2xl:py-20 1xl:py-17 lg:py-14 md:py-12 sm:py-11 py-10 bg-whitesmoke-200">
            <div class="container">
                <div
                    class="grid items-center lt:grid-cols-2 grid-cols-1 2xl:gap-10 1xl:gap-9 xl:gap-8 lg:gap-7 lt:gap-6 gap-4 2xl:mb-[50px] 1xl:mb-11 xl:mb-[38px] sm:mb-8 mb-5">
                    <div>
                        <h3 class="text-thunder-100 font-primary italic font-medium 1xl:mb-6 sm:mb-4 mb-2.5">
                           {{ section_title }}
                        </h3>
                        <h2 class="text-primary font-normal uppercase">
                           {{ sub_title }}
                        </h2>
                    </div>
                    <div class="max-w-[842px]">
                        <p
                            class="text-thunder-100 max-w-[890px] 2xl:mb-10 1xl:mb-9 xl:mb-8 lg:mb-7.5 md:mb-7 sm:mb-6.5 mb-6">
                           {{ description }}
                        </p>
                        {{ if button_text }}
                        <a href="{{ button_url }}" class="btn btn-secondary">{{ button_text }}</a>
                        {{ /if }}
                    </div>
                </div>

                <div
                    class="grid grid-cols-1 sm:grid-cols-2 lt:grid-cols-4 1xl:gap-[30px] xl:gap-6 lt:gap-3.5 sm:gap-6 gap-4">
                    <!-- 1st class -->
                    {{ instructors limit="4" }}
                  
                    

                    <!-- 2nd class -->
                    <div class="block overflow-hidden relative shrink-0 rounded-sm">
                        <div class="group">
                            <div
                                class="relative before:content-[''] 1xl:before:pt-[119%] lg:before:pt-[135%] lt:before:pt-[150%] before:pt-[120%] before:block w-full h-full">
                                 {{ image }}<img loading="lazy" decoding="async" src="{{ url }}" alt="Hatha Yoga"
                                    class="w-full h-full object-cover absolute top-0 left-0 bottom-0 right-0 group-hover/class:scale-105 scale-100 transition-all ease-in-out duration-350" /> {{ /image }}
                            </div>
                            <div
                                class="absolute inset-0 bg-linear-to-t from-thunder-100 from-10% via-transparent to-transparent pointer-events-none">
                            </div>

                            {{ social_share }}
                            <div class="absolute 1xl:top-6 1xl:right-6 top-4 right-4 z-20 flex flex-col gap-3">
                                {{ socials }}
                                <a href="{{ url }}{{config:app.url}}team/{{ slug }}" target="_blank" rel="noopener noreferrer"
                                    class="flex items-center justify-center w-7.5 h-7.5 rounded-full border border-white text-white lt:opacity-0 lt:-translate-y-4 group-hover:opacity-100 group-hover:translate-y-0 hover:bg-white hover:text-black transition-all duration-250 ease-in-out delay-0">
                                   <i class="fa-brands fa-{{ platform }}"></i>
                                </a>

                                {{ /socials }}
                            </div>
                            {{ /social_share }}

                            <a href="/team/{{ slug }}"
                                class="absolute bottom-0 left-0 text-white backdrop-blur-xs w-full">
                                <div class="2xl:p-5 1xl:p-4 p-3">
                                    <div
                                        class="flex items-center justify-between w-full xl:gap-3 gap-1.5 1xl:mb-[10px] mb-2">
                                        <h3
                                            class="font-normal font-secondary uppercase hover:underline underline-offset-1 decoration-1 text-white!">
                                           {{ title }}
                                        </h3>
                                        <div
                                            class="rounded-full border border-white shrink-0 2xl:w-[45px] 2xl:h-[45px] 1xl:w-10 1xl:h-10 lg:w-9 lg:h-9 w-8 h-8 flex items-center justify-center nav-class-arrow">
                                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="14"
                                                viewBox="0 0 11 11" fill="none"
                                                class="mt-px ml-px stroke-white! group-hover:stroke-primary! lg:w-[18px] lg:h-[14px] w-[16px] h-[12px]">
                                                <path
                                                    d="M0.692504 9.68278C0.692504 9.68278 6.5362 3.54949 8.97019 0.994861M8.97019 0.994861L9.59281 7.58973M8.97019 0.994861L2.35248 0.69208"
                                                    stroke="currentColor" stroke-width="1.38442" stroke-linecap="round"
                                                    stroke-linejoin="round" />
                                            </svg>
                                        </div>
                                    </div>
                                    <p class="text-white! font-medium 2xl:w-[82%] w-[90%]">
                                         {{ instructor_title }}
                                    </p>
                                </div>
                            </a>
                        </div>
                    </div>
                    {{ /instructors }}
                   
                </div>

            </div>
        </section>
