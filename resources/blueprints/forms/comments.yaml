tabs:
  main:
    display: Main
    sections:
      -
        fields:
          -
            handle: first_name
            field:
              type: text
              display: 'First Name'
              validate:
                - required
          -
            handle: last_name
            field:
              type: text
              display: 'Last Name'
              validate:
                - required
          -
            handle: email
            field:
              type: text
              display: Email
              validate:
                - required
                - email
          -
            handle: comment
            field:
              type: textarea
              display: Comment
              validate:
                - required
          -
            handle: image
            field:
              container: assets
              max_files: 1
              type: assets
              display: Image
          -
            handle: post_id
            field:
              type: hidden
              display: 'Post ID'
              validate:
                - required
          -
            handle: parent_id
            field:
              type: hidden
              display: 'Parent ID'
              default: 'null'
