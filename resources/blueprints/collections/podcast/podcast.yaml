title: Podcast
tabs:
  main:
    display: Main
    sections:
      -
        fields:
          -
            handle: title
            field:
              type: text
              required: true
              validate:
                - required
              display: Title
          -
            handle: description
            field:
              type: textarea
              display: Description
          -
            handle: duration
            field:
              type: text
              display: Duration
              instructions: '22 minutes'
          -
            handle: artist_name
            field:
              type: text
              display: 'Artist Name'
          -
            handle: image
            field:
              container: assets
              max_files: 1
              type: assets
              display: Image
          -
            handle: audio
            field:
              container: assets
              max_files: 1
              type: assets
              display: Audio
          -
            handle: episode_number
            field:
              type: text
              display: 'Episode Number'
              instructions: 'Example - Episode-1'
              width: 50
          -
            handle: order_by
            field:
              type: integer
              display: 'Order by'
              width: 50
  sidebar:
    display: Sidebar
    sections:
      -
        fields:
          -
            handle: slug
            field:
              type: slug
              localizable: true
              validate: 'max:200'
